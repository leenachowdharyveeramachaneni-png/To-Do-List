<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* BODY */
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.box {
    width: 360px;
    padding: 30px;
    border-radius: 18px;
    background: white;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    text-align: center;
}

/* TITLE */
h2 {
    margin-bottom: 20px;
}

/* INPUTS */
.input-group input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: 1px solid #ddd;
    outline: none;
    transition: 0.2s;
}

.input-group input:focus {
    border-color: #667eea;
    box-shadow: 0 0 5px rgba(102,126,234,0.3);
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

/* LOGIN */
.login-btn {
    background: #667eea;
    color: white;
}

.login-btn:hover {
    background: #4f5bd5;
}

/* SIGNUP */
.signup-btn {
    background: #f0f2ff;
    color: #333;
}

.signup-btn:hover {
    background: #dfe3ff;
}

/* NOTE */
.note {
    margin-top: 10px;
    font-size: 12px;
    color: gray;
}
</style>

</head>

<body>

<div class="box">
    <h2>Welcome Back 👋</h2>

    <div class="input-group">
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
    </div>

    <button class="login-btn" onclick="login()">Login</button>
    <button class="signup-btn" onclick="signup()">Create Account</button>

    <p class="note">Connected to MySQL 🔥</p>
</div>

<script>
function signup() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    fetch("http://localhost:3000/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
    })
    .then(res => res.text())
    .then(data => {
        alert(data);
    });
}

function login() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    fetch("http://localhost:3000/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            localStorage.setItem("user", username);
            window.location.href = "index.html";
        } else {
            alert("Invalid login ❌");
        }
    });
}
</script>

</body>
</html>
